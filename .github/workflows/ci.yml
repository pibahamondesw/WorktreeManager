name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify lockfile is up to date
        run: |
          pnpm install --lockfile-only
          if ! git diff --exit-code; then
            echo "::error::pnpm-lock.yaml is out of date (see diff above). Run 'pnpm install' locally and commit the updated pnpm-lock.yaml."
            exit 1
          fi

      - name: Lint
        run: pnpm run lint:ts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

  rust:
    name: Rust (clippy, fmt, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets --manifest-path src-tauri/Cargo.toml

      - name: Format check
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
